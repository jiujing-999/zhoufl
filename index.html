<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>5月30日 · 婚礼当天行程</title>
<style>
  :root{
    --red:#6B0F1A;          /* 主暗红 */
    --red-deep:#4A0A12;     /* 更深 */
    --red-wine:#8B1A26;     /* 酒红高光 */
    --red-soft:#EBD3D6;
    --red-bg:#FBF3F4;
    --gold:#B8924A;         /* 中性金 */
    --gold-deep:#8C6A2E;    /* 暗金 */
    --gold-light:#D4B373;   /* 亮金 */
    --gold-soft:#EAD9B4;
    --ivory:#FBF6EE;        /* 偏暖象牙 */
    --ink:#2A1A14;
    --ink-2:#544038;
    --muted:#998878;
    --line:#E8DBC4;
    --card:#FFFDF8;
    --shadow:0 4px 24px -10px rgba(74,10,18,.22);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 500px at 50% -200px, rgba(107,15,26,.18) 0%, transparent 70%),
      linear-gradient(180deg, var(--ivory) 0%, #F6EEDD 100%);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--red);text-decoration:none}

  /* ---------- GOLD ORNAMENTS ---------- */
  .ornament{
    display:block;margin:0 auto;color:var(--gold);
    opacity:.85;
  }
  .gold-line{
    height:1px;border:0;
    background:linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold-light) 50%, var(--gold) 80%, transparent);
    margin:0;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    text-align:center;
    padding:54px 20px 30px;
    overflow:hidden;
    background:
      radial-gradient(ellipse at center top, rgba(184,146,74,.08), transparent 60%),
      linear-gradient(180deg, rgba(107,15,26,.04), transparent);
    border-bottom:1px solid transparent;
    border-image:linear-gradient(90deg,transparent,var(--gold),transparent) 1;
  }
  .hero::before,.hero::after{
    content:"囍";
    position:absolute;
    color:var(--red);
    opacity:.05;
    font-size:clamp(80px,20vw,260px);
    font-weight:900;
    top:-40px;
    line-height:1;
    font-family:"Noto Serif SC","Songti SC",serif;
  }
  .hero::before{left:clamp(-30px,-2vw,-10px);transform:rotate(-8deg)}
  .hero::after{right:clamp(-30px,-2vw,-10px);transform:rotate(8deg)}
  .hero-corner{
    position:absolute;width:90px;height:90px;color:var(--gold);
    opacity:.7;pointer-events:none;
  }
  .hero-corner.tl{top:14px;left:14px}
  .hero-corner.tr{top:14px;right:14px;transform:scaleX(-1)}
  .hero-corner.bl{bottom:14px;left:14px;transform:scaleY(-1)}
  .hero-corner.br{bottom:14px;right:14px;transform:scale(-1,-1)}
  @media (max-width:640px){
    .hero-corner{width:54px;height:54px}
  }
  .hero .inner{position:relative;z-index:1}
  .hero .ribbon{
    display:inline-block;
    color:var(--gold-deep);
    letter-spacing:.4em;
    font-size:11px;
    padding:5px 16px 5px 20px;
    border:1px solid var(--gold);
    border-radius:999px;
    margin-bottom:20px;
    background:linear-gradient(180deg,rgba(255,253,248,.9),rgba(234,217,180,.4));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.5);
  }
  .hero h1{
    font-family:"Noto Serif SC","Songti SC","SimSun",serif;
    font-weight:600;
    font-size:clamp(38px,7vw,68px);
    margin:0 0 8px;
    letter-spacing:.06em;
    color:var(--red);
    font-weight:900;
    text-shadow:0 1px 0 rgba(184,146,74,.25);
  }
  .hero .names{
    font-family:"Noto Serif SC","Songti SC",serif;
    font-size:clamp(22px,4vw,36px);
    font-weight:700;
    color:var(--red);
    letter-spacing:.15em;
    margin-bottom:8px;
  }
  .hero .names .amp{
    color:var(--gold);
    font-size:1.2em;
    margin:0 10px;
    font-weight:400;
  }
  .hero .date{
    font-family:"Noto Serif SC","Songti SC",serif;
    font-size:clamp(14px,2.4vw,18px);
    color:var(--ink-2);
    letter-spacing:.3em;
    margin-bottom:6px;
  }
  .hero .sub{
    color:var(--gold-deep);
    font-size:12px;
    letter-spacing:.35em;
  }
  .hero .divider{
    width:160px;height:14px;
    margin:22px auto 0;position:relative;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .hero .divider .line{
    flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold));
  }
  .hero .divider .line.r{
    background:linear-gradient(90deg,var(--gold),transparent);
  }
  .hero .divider .gem{
    width:8px;height:8px;background:var(--gold);
    transform:rotate(45deg);
    box-shadow:0 0 0 2px rgba(184,146,74,.2);
  }

  /* ---------- META BAR ---------- */
  .meta{
    max-width:920px;margin:24px auto 24px;padding:0 20px;
    display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
  }
  .meta .item{
    position:relative;
    background:linear-gradient(180deg,var(--card),#FFF8EC);
    border:1px solid var(--gold-soft);
    border-radius:6px;padding:14px 12px;text-align:center;
    box-shadow:inset 0 0 0 1px rgba(184,146,74,.18), 0 2px 10px -6px rgba(74,10,18,.15);
  }
  .meta .item::before,.meta .item::after{
    content:"";position:absolute;width:10px;height:10px;
    border:1px solid var(--gold);
  }
  .meta .item::before{top:3px;left:3px;border-right:none;border-bottom:none}
  .meta .item::after{bottom:3px;right:3px;border-left:none;border-top:none}
  .meta .item .k{color:var(--gold-deep);font-size:11px;letter-spacing:.25em}
  .meta .item .v{color:var(--red);font-size:15px;font-weight:600;margin-top:4px;font-family:"Noto Serif SC","Songti SC",serif}
  @media (max-width:640px){
    .meta{grid-template-columns:repeat(2,1fr)}
  }

  /* ---------- TABS ---------- */
  .tabs-wrap{
    position:sticky;top:0;z-index:10;
    background:rgba(251,246,238,.94);
    backdrop-filter:saturate(180%) blur(10px);
    -webkit-backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid transparent;
    border-image:linear-gradient(90deg,transparent,var(--gold),transparent) 1;
    box-shadow:0 1px 0 rgba(184,146,74,.15);
  }
  .tabs{
    max-width:920px;margin:0 auto;
    display:flex;gap:8px;overflow-x:auto;
    padding:14px 20px;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;cursor:pointer;user-select:none;
    padding:8px 16px;border-radius:4px;
    font-size:13px;color:var(--ink-2);
    background:var(--card);border:1px solid var(--gold-soft);
    transition:all .2s ease;white-space:nowrap;
    letter-spacing:.05em;
  }
  .tab:hover{border-color:var(--gold);color:var(--red)}
  .tab.active{
    background:linear-gradient(180deg,var(--red),var(--red-deep));
    color:#FBE9C2;border-color:var(--gold);
    box-shadow:0 4px 14px -4px rgba(74,10,18,.5), inset 0 0 0 1px rgba(212,179,115,.4);
  }
  .tab .dot{
    display:inline-block;width:5px;height:5px;
    background:var(--gold);margin-right:6px;vertical-align:middle;
    transform:rotate(45deg);
  }
  .tab.active .dot{background:var(--gold-light)}

  /* role card hint shown under tabs */
  .role-hint{
    max-width:920px;margin:0 auto;
    padding:14px 20px 0;color:var(--ink-2);font-size:13px;
  }
  .role-hint b{color:var(--red-deep)}

  /* ---------- TIMELINE ---------- */
  .timeline{
    max-width:920px;margin:0 auto;padding:18px 20px 80px;
    position:relative;
  }
  .phase-band{
    margin:28px 0 14px;
    display:flex;align-items:center;gap:12px;
    position:relative;
  }
  .phase-band .ico{
    flex:0 0 auto;width:18px;height:18px;color:var(--gold);
  }
  .phase-band .bar{
    flex:1;height:1px;
    background:linear-gradient(90deg,var(--gold) 0%,var(--gold-soft) 60%,transparent 100%);
  }
  .phase-band h2{
    margin:0;font-size:15px;letter-spacing:.25em;
    color:var(--red);font-weight:600;
    font-family:"Noto Serif SC","Songti SC",serif;
    padding:0 4px;
  }
  .phase-band .count{
    color:var(--gold-deep);font-size:11px;letter-spacing:.15em;
    border:1px solid var(--gold-soft);
    padding:2px 8px;border-radius:999px;
    background:#FFF8EC;
  }

  .row{
    display:grid;grid-template-columns:96px 1fr;gap:14px;
    align-items:stretch;margin-bottom:12px;
  }
  .time-col{
    text-align:right;padding-top:14px;position:relative;
  }
  .time-col .start{
    font-family:"Noto Serif SC","Songti SC",serif;
    font-size:22px;font-weight:600;color:var(--red);
    line-height:1.1;letter-spacing:.02em;
  }
  .time-col .end{
    color:var(--muted);font-size:12px;margin-top:3px;
    font-family:"SF Mono",ui-monospace,Menlo,monospace;
  }
  .time-col .dur{
    display:inline-block;margin-top:7px;font-size:11px;
    color:var(--gold-deep);background:#FFF8EC;
    border:1px solid var(--gold-soft);
    border-radius:999px;padding:2px 9px;
  }

  .card{
    position:relative;background:var(--card);
    border:1px solid var(--gold-soft);border-radius:6px;
    padding:16px 18px;box-shadow:var(--shadow);
  }
  .card::before{
    content:"";position:absolute;left:-8px;top:20px;
    width:12px;height:12px;background:var(--card);
    border:2px solid var(--gold);
    transform:rotate(45deg);
  }
  /* gold inner border accent */
  .card::after{
    content:"";position:absolute;inset:3px;border-radius:4px;
    border:1px solid rgba(184,146,74,.18);
    pointer-events:none;
  }
  .card > *{position:relative;z-index:1}
  .card .title-line{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    margin-bottom:8px;padding-bottom:8px;
    border-bottom:1px dashed var(--gold-soft);
  }
  .card .activity{
    font-size:16px;font-weight:600;color:var(--red);
    font-family:"Noto Serif SC","Songti SC",serif;
    letter-spacing:.04em;
  }
  .badge{
    display:inline-block;font-size:11px;line-height:1;
    padding:5px 9px;border-radius:3px;letter-spacing:.08em;
    background:linear-gradient(180deg,var(--red),var(--red-deep));
    color:#FBE9C2;
    box-shadow:inset 0 0 0 1px rgba(212,179,115,.35);
  }
  .badge.outfit{
    background:linear-gradient(180deg,#FFF8EC,#F0DDB0);
    color:var(--gold-deep);
    border:1px solid var(--gold-soft);
    box-shadow:none;
  }

  .summary{color:var(--ink-2);font-size:14px;white-space:pre-line}

  .roles{
    margin-top:12px;padding-top:12px;
    border-top:1px solid transparent;
    border-image:linear-gradient(90deg,transparent,var(--gold-soft),transparent) 1;
    display:grid;grid-template-columns:repeat(2,1fr);gap:8px 14px;
  }
  @media (max-width:640px){
    .roles{grid-template-columns:1fr}
    .row{grid-template-columns:74px 1fr;gap:10px}
    .time-col .start{font-size:18px}
  }
  .role{
    display:flex;gap:8px;align-items:flex-start;font-size:13px;
  }
  .role .lbl{
    flex:0 0 auto;color:var(--gold-deep);font-weight:600;
    background:#FFF8EC;border:1px solid var(--gold-soft);
    padding:2px 8px;border-radius:3px;
    white-space:nowrap;font-size:12px;letter-spacing:.05em;
  }
  .role .txt{color:var(--ink-2);white-space:pre-line}
  .role-spacer{display:block}

  /* highlight role-specific card when filtered */
  .card.focus{
    border-color:var(--gold);
    box-shadow:0 6px 28px -8px rgba(74,10,18,.4),
               inset 0 0 0 1px rgba(212,179,115,.35);
  }
  .card.focus::after{border-color:var(--gold)}
  .card.focus .focus-block{
    margin-top:12px;padding:12px 14px;
    background:
      linear-gradient(180deg,rgba(107,15,26,.92),rgba(74,10,18,.95));
    border:1px solid var(--gold);
    color:#FBE9C2;font-size:14px;white-space:pre-line;
    border-radius:4px;
    box-shadow:inset 0 0 0 1px rgba(212,179,115,.3);
    position:relative;
  }
  .card.focus .focus-block::before,
  .card.focus .focus-block::after{
    content:"";position:absolute;width:8px;height:8px;
    border:1px solid var(--gold-light);
  }
  .card.focus .focus-block::before{top:3px;left:3px;border-right:none;border-bottom:none}
  .card.focus .focus-block::after{bottom:3px;right:3px;border-left:none;border-top:none}
  .card.focus .focus-block .lbl{
    display:inline-block;font-size:11px;letter-spacing:.2em;
    color:var(--red-deep);
    background:linear-gradient(180deg,var(--gold-light),var(--gold));
    padding:3px 10px;border-radius:3px;
    margin-right:10px;vertical-align:middle;font-weight:600;
  }
  .card.dim{opacity:.4}

  /* footer */
  footer{
    text-align:center;color:var(--gold-deep);font-size:12px;
    padding:30px 20px 60px;letter-spacing:.4em;
    font-family:"Noto Serif SC","Songti SC",serif;
  }
  .footer-orn{
    display:flex;align-items:center;justify-content:center;gap:12px;
    margin-bottom:10px;
  }
  .footer-orn .l{
    width:60px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold));
  }
  .footer-orn .r{
    width:60px;height:1px;
    background:linear-gradient(90deg,var(--gold),transparent);
  }
  .footer-orn .c{color:var(--gold);font-size:14px}
  .print-btn{
    position:fixed;right:18px;bottom:18px;z-index:20;
    background:linear-gradient(180deg,var(--red),var(--red-deep));
    color:#FBE9C2;border:1px solid var(--gold);cursor:pointer;
    border-radius:4px;padding:10px 18px;font-size:13px;letter-spacing:.1em;
    box-shadow:0 8px 24px -6px rgba(74,10,18,.6),
               inset 0 0 0 1px rgba(212,179,115,.4);
  }

  /* print */
  @media print{
    .tabs-wrap,.print-btn{display:none}
    body{background:#fff}
    .card{break-inside:avoid;box-shadow:none;border-color:#ccc}
    .hero::before,.hero::after{display:none}
  }
</style>
</head>

/* -------- RENDER -------- */
const tabsEl = document.getElementById("tabs");
const timelineEl = document.getElementById("timeline");
const hintEl = document.getElementById("hint");
let currentRole = "all";

function buildTabs(){
  tabsEl.innerHTML = "";
  ROLES.forEach(r=>{
    const btn = document.createElement("div");
    btn.className = "tab" + (r.key===currentRole?" active":"");
    btn.innerHTML = `<span class="dot"></span>${r.name}`;
    btn.onclick = ()=>{ currentRole = r.key; render(); };
    tabsEl.appendChild(btn);
  });
}

function renderHint(){
  if(currentRole==="all"){
    hintEl.innerHTML = `点击上方标签，可只看 <b>某个人 / 某个组</b> 的行程；红色高亮卡片就是该角色这一刻要做的事。`;
  } else {
    const name = ROLES.find(r=>r.key===currentRole).name;
    const focusedCount = EVENTS.filter(e=>e.roles && e.roles[currentRole]).length;
    hintEl.innerHTML = `当前视图：<b>${name}</b> · 共 ${focusedCount} 项专属任务，其余事项已淡化处理。`;
  }
}

function renderTimeline(){
  timelineEl.innerHTML = "";
  let lastPhase = "";
  EVENTS.forEach((ev,i)=>{
    if(ev.phase !== lastPhase){
      const band = document.createElement("div");
      band.className = "phase-band";
      const cnt = EVENTS.filter(e=>e.phase===ev.phase).length;
      band.innerHTML = `
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M12 2 L14 9 L21 10 L16 14 L18 21 L12 17 L6 21 L8 14 L3 10 L10 9 Z" opacity=".25"/>
          <circle cx="12" cy="12" r="3" fill="currentColor" opacity=".8"/>
        </svg>
        <h2>${ev.phase}</h2>
        <span class="bar"></span>
        <span class="count">${cnt} 环</span>`;
      timelineEl.appendChild(band);
      lastPhase = ev.phase;
    }
    const row = document.createElement("div");
    row.className = "row";

    const focusText = currentRole!=="all" && ev.roles && ev.roles[currentRole];
    const isFocus = !!focusText;
    const isDim = currentRole!=="all" && !isFocus;

    let rolesHtml = "";
    if(currentRole === "all" && ev.roles){
      const items = Object.entries(ev.roles).map(([k,v])=>{
        if(k.startsWith('_')) return `<div class="role-spacer"></div>`;
        return `<div class="role"><span class="lbl">${ROLE_LABEL[k]||k}</span><span class="txt">${v}</span></div>`;
      }).join("");
      if(items) rolesHtml = `<div class="roles">${items}</div>`;
    }
    let focusHtml = "";
    if(isFocus){
      focusHtml = `<div class="focus-block"><span class="lbl">你要做</span>${focusText}</div>`;
    }
    const outfitBadge = ev.outfit ? `<span class="badge outfit">服装：${ev.outfit}</span>` : "";

    row.innerHTML = `
      <div class="time-col">
        <div class="start">${ev.start}</div>
        <div class="end">— ${ev.end}</div>
        <div class="dur">${ev.dur}</div>
      </div>
      <div class="card ${isFocus?'focus':''} ${isDim?'dim':''}">
        <div class="title-line">
          <span class="badge">${ev.phase}</span>
          <span class="activity">${ev.activity}</span>
          ${outfitBadge}
        </div>
        <div class="summary">${ev.summary||""}</div>
        ${focusHtml}
        ${rolesHtml}
      </div>
    `;
    timelineEl.appendChild(row);
  });
}

function render(){ buildTabs(); renderHint(); renderTimeline(); }
render();
